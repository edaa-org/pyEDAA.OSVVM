name: Pipeline

on:
  push:
  workflow_dispatch:
  schedule:
# Every Friday at 22:00 - rerun pipeline to check for dependency-based issues
    - cron: '0 22 * * 5'

permissions:
  actions:  write
  contents: write
  pages:    write
  id-token: write

jobs:
  Pipeline:
    uses: pyTooling/Actions/.github/workflows/CompletePipeline.yml@dev
    with:
      package_namespace:   'pyEDAA'
      package_name:        'OSVVM'
      unittest_python_version_list: '3.12 3.13 3.14'
      unittest_disable_list:        'windows-arm:*'
      bandit:              'true'
      pylint:              'false'
      codecov:             'true'
      codacy:              'true'
      dorny:               'true'
      documentation_steps: 'html latex pages pdf'
    secrets:
      PYPI_TOKEN:    ${{ secrets.PYPI_TOKEN }}
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      CODACY_TOKEN:  ${{ secrets.CODACY_TOKEN }}
